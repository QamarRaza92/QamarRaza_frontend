<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>Product Inventory Dashboard</h1>
    </header>

    <main class="dashboard-container">
        
        <section class="controls-section">
            <input type="text" id="searchInput" placeholder="Search product by name...">
            
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="books">Books</option>
                <option value="accessories">Accessories</option>
            </select>

            <button id="lowStockBtn" class="filter-btn">Show Low Stock (< 5)</button>

            <select id="sortDropdown">
                <option value="default">Sort By: Default</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name-asc">Alphabetically: A-Z</option>
                <option value="name-desc">Alphabetically: Z-A</option>
            </select>
        </section>

        <section class="analytics-section">
            <div class="stat-box">
                <h3>Total Products</h3>
                <p id="totalProductsCount">0</p>
            </div>
            <div class="stat-box">
                <h3>Total Inventory Value</h3>
                <p id="totalInventoryValue">₹0</p>
            </div>
            <div class="stat-box">
                <h3>Out of Stock</h3>
                <p id="outOfStockCount">0</p>
            </div>
        </section>

        <div id="loadingMessage" class="loading-state">
            <p>Loading products... Please wait.</p>
        </div>

        <section id="productGrid" class="grid-layout hidden">
            </section>

        <section class="add-product-section">
            <h2>Add New Product</h2>
            <form id="addProductForm">
                <div class="input-group">
                    <label for="prodName">Product Name</label>
                    <input type="text" id="prodName" required>
                </div>
                
                <div class="input-group">
                    <label for="prodPrice">Price (₹)</label>
                    <input type="number" id="prodPrice" min="1" required>
                </div>
                
                <div class="input-group">
                    <label for="prodStock">Stock Quantity</label>
                    <input type="number" id="prodStock" min="0" required>
                </div>
                
                <div class="input-group">
                    <label for="prodCategory">Category</label>
                    <select id="prodCategory" required>
                        <option value="">Select a Category</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                
                <button type="submit" id="submitProductBtn">Add to Inventory</button>
            </form>
        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
